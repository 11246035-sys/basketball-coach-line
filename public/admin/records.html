<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程紀錄管理</title>
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <style>
    .upload-area {
      border: 2px dashed var(--gray-200);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover, .upload-area.dragover { border-color: var(--orange); }
    .upload-area input[type="file"] { display: none; }
    .preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .preview-item {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .preview-item img, .preview-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
      display: block;
    }
    .preview-item .remove {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-item .file-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 9px;
      text-align: center;
      border-radius: 0 0 6px 6px;
      padding: 2px 2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .record-item {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .record-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
    }
    .record-photos {
      display: flex;
      gap: 4px;
      padding: 0 16px 8px;
      overflow-x: auto;
    }
    .record-photos img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .record-videos {
      padding: 0 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .record-videos video {
      width: 100%;
      max-height: 160px;
      border-radius: 6px;
      background: #000;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .upload-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 8px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--gray-200);
    }
    .upload-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #f9fafb;
      color: var(--gray-600);
      transition: background 0.15s, color 0.15s;
      border: none;
    }
    .upload-tab.active {
      background: var(--orange);
      color: #fff;
    }
    .upload-panel { display: none; }
    .upload-panel.active { display: block; }
  </style>
</head>
<body>
  <nav class="admin-nav">
    <div class="nav-brand">🏀 籃球家教後台</div>
    <button class="nav-logout" id="logoutBtn">登出</button>
  </nav>

  <div class="admin-tabs">
    <a href="dashboard.html" class="tab">📊 總覽</a>
    <a href="bookings.html" class="tab">📅 預約管理</a>
    <a href="calendar.html" class="tab">🗓️ 行事曆</a>
    <a href="records.html" class="tab active">📸 課程紀錄</a>
    <a href="students.html" class="tab">👥 學生管理</a>
    <a href="blacklist.html" class="tab">🚫 黑名單</a>
  </div>

  <div class="admin-container">
    <button class="btn btn-primary" onclick="openModal()" style="margin-bottom:16px;width:auto">
      + 新增課程紀錄
    </button>

    <div id="recordsList">載入中...</div>
  </div>

  <!-- 新增紀錄 Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-title">📸 新增課程紀錄</div>
      <form id="recordForm" enctype="multipart/form-data">
        <div class="form-group">
          <label>上課日期 *</label>
          <input type="date" id="recDate" required>
        </div>
        <div class="form-group">
          <label>學生姓名 *</label>
          <input type="text" id="recStudent" placeholder="請輸入學生姓名" required>
        </div>
        <div class="form-group">
          <label>LINE 用戶 ID（發送通知用，可留空）</label>
          <input type="text" id="recLineId" placeholder="Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
        </div>
        <div class="form-group">
          <label>課程說明</label>
          <textarea id="recDesc" placeholder="今日訓練內容、進步情況、下次重點..."></textarea>
        </div>

        <!-- 上傳區 tabs -->
        <div class="form-group">
          <label>上傳媒體</label>
          <div class="upload-tabs">
            <button type="button" class="upload-tab active" onclick="switchTab('photo')">📷 照片（最多 5 張）</button>
            <button type="button" class="upload-tab" onclick="switchTab('video')">🎬 影片（最多 3 支）</button>
          </div>

          <!-- 照片上傳 -->
          <div class="upload-panel active" id="photoPanel">
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('photoInput').click()">
              <div style="font-size:28px">📷</div>
              <div style="font-size:13px;color:#6b7280;margin-top:6px">點擊選擇照片或拖曳至此</div>
              <input type="file" id="photoInput" accept="image/*" multiple>
            </div>
            <div class="preview-grid" id="previewGrid"></div>
          </div>

          <!-- 影片上傳 -->
          <div class="upload-panel" id="videoPanel">
            <div class="upload-area" id="videoUploadArea" onclick="document.getElementById('videoInput').click()">
              <div style="font-size:28px">🎬</div>
              <div style="font-size:13px;color:#6b7280;margin-top:6px">點擊選擇影片（mp4 / mov / webm，單支限 50MB）</div>
              <input type="file" id="videoInput" accept="video/mp4,video/quicktime,video/webm" multiple>
            </div>
            <div class="preview-grid" id="videoPreviewGrid"></div>
          </div>
        </div>

        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="notifyParent" checked>
            <span>上傳後發送 LINE 通知給家長</span>
          </label>
        </div>

        <div id="uploadAlert"></div>
        <div id="uploadProgress" style="display:none">
          <div style="background:#e5e7eb;border-radius:4px;height:8px">
            <div id="progressBar" style="background:var(--orange);height:100%;border-radius:4px;width:0%;transition:width 0.3s"></div>
          </div>
          <div style="text-align:center;font-size:13px;margin-top:4px;color:#6b7280" id="progressLabel">上傳中...</div>
        </div>

        <div style="display:flex;gap:8px;margin-top:8px">
          <button type="button" class="btn btn-outline" onclick="closeModal()" style="flex:1">取消</button>
          <button type="submit" class="btn btn-primary" id="submitBtn" style="flex:1">儲存紀錄</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/js/admin-common.js"></script>
  <script>
    let selectedFiles = [];
    let selectedVideos = [];
    let activeTab = 'photo';

    requireLogin(loadRecords);
    document.getElementById('recDate').value = new Date().toISOString().split('T')[0];

    // 切換 photo/video tab
    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.upload-tab').forEach((el, i) => {
        el.classList.toggle('active', (tab === 'photo' && i === 0) || (tab === 'video' && i === 1));
      });
      document.getElementById('photoPanel').classList.toggle('active', tab === 'photo');
      document.getElementById('videoPanel').classList.toggle('active', tab === 'video');
    }

    // 照片選擇
    document.getElementById('photoInput').addEventListener('change', handlePhotoFiles);
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handlePhotoFiles({ target: { files: e.dataTransfer.files } });
    });

    function handlePhotoFiles(e) {
      const newFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
      selectedFiles = [...selectedFiles, ...newFiles].slice(0, 5);
      renderPhotoPreview();
    }

    function renderPhotoPreview() {
      const grid = document.getElementById('previewGrid');
      grid.innerHTML = selectedFiles.map((f, i) => {
        const url = URL.createObjectURL(f);
        return `<div class="preview-item">
          <img src="${url}" alt="">
          <button type="button" class="remove" onclick="removePhoto(${i})">✕</button>
        </div>`;
      }).join('');
    }

    function removePhoto(index) {
      selectedFiles.splice(index, 1);
      renderPhotoPreview();
    }

    // 影片選擇
    document.getElementById('videoInput').addEventListener('change', handleVideoFiles);
    const videoUploadArea = document.getElementById('videoUploadArea');
    videoUploadArea.addEventListener('dragover', e => { e.preventDefault(); videoUploadArea.classList.add('dragover'); });
    videoUploadArea.addEventListener('dragleave', () => videoUploadArea.classList.remove('dragover'));
    videoUploadArea.addEventListener('drop', e => {
      e.preventDefault();
      videoUploadArea.classList.remove('dragover');
      handleVideoFiles({ target: { files: e.dataTransfer.files } });
    });

    const ALLOWED_VIDEO_TYPES = ['video/mp4', 'video/quicktime', 'video/webm'];
    const MAX_VIDEO_SIZE = 50 * 1024 * 1024;

    function handleVideoFiles(e) {
      const files = Array.from(e.target.files);
      const alertEl = document.getElementById('uploadAlert');
      alertEl.innerHTML = '';
      const oversize = files.filter(f => f.size > MAX_VIDEO_SIZE);
      const invalid = files.filter(f => !ALLOWED_VIDEO_TYPES.includes(f.type));
      if (oversize.length > 0) {
        alertEl.innerHTML = `<div class="alert alert-error">影片「${oversize.map(f=>f.name).join('、')}」超過 50MB 限制，已略過。</div>`;
      }
      if (invalid.length > 0) {
        alertEl.innerHTML += `<div class="alert alert-error">檔案「${invalid.map(f=>f.name).join('、')}」格式不支援，僅接受 mp4/mov/webm。</div>`;
      }
      const validFiles = files.filter(f => ALLOWED_VIDEO_TYPES.includes(f.type) && f.size <= MAX_VIDEO_SIZE);
      selectedVideos = [...selectedVideos, ...validFiles].slice(0, 3);
      renderVideoPreview();
      // 重置 input 讓同一檔案可再選
      document.getElementById('videoInput').value = '';
    }

    function renderVideoPreview() {
      const grid = document.getElementById('videoPreviewGrid');
      grid.innerHTML = selectedVideos.map((f, i) => {
        const url = URL.createObjectURL(f);
        const name = f.name.length > 12 ? f.name.slice(0, 10) + '…' : f.name;
        return `<div class="preview-item">
          <video src="${url}" muted preload="metadata"></video>
          <span class="file-label">${name}</span>
          <button type="button" class="remove" onclick="removeVideo(${i})">✕</button>
        </div>`;
      }).join('');
    }

    function removeVideo(index) {
      selectedVideos.splice(index, 1);
      renderVideoPreview();
    }

    function openModal() {
      document.getElementById('addModal').classList.add('active');
    }
    function closeModal() {
      document.getElementById('addModal').classList.remove('active');
      document.getElementById('recordForm').reset();
      selectedFiles = [];
      selectedVideos = [];
      renderPhotoPreview();
      renderVideoPreview();
      document.getElementById('uploadAlert').innerHTML = '';
      document.getElementById('recDate').value = new Date().toISOString().split('T')[0];
      switchTab('photo');
    }

    document.getElementById('recordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const date = document.getElementById('recDate').value;
      const student = document.getElementById('recStudent').value.trim();
      const lineId = document.getElementById('recLineId').value.trim();
      const desc = document.getElementById('recDesc').value.trim();
      const notify = document.getElementById('notifyParent').checked;

      if (!date || !student) {
        document.getElementById('uploadAlert').innerHTML = '<div class="alert alert-error">請填寫日期和學生姓名</div>';
        return;
      }

      const formData = new FormData();
      formData.append('date', date);
      formData.append('student_name', student);
      if (lineId) formData.append('line_user_id', lineId);
      if (desc) formData.append('description', desc);
      formData.append('notify', notify ? 'true' : 'false');
      selectedFiles.forEach(f => formData.append('photos', f));
      selectedVideos.forEach(f => formData.append('videos', f));

      const totalVideos = selectedVideos.length;
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '儲存中...';
      document.getElementById('uploadProgress').style.display = 'block';
      document.getElementById('progressLabel').textContent = totalVideos > 0 ? '上傳中（影片較大，請稍候）...' : '上傳中...';
      document.getElementById('progressBar').style.width = '30%';

      try {
        const res = await fetch('/api/records', { method: 'POST', body: formData });
        document.getElementById('progressBar').style.width = '100%';
        const data = await res.json();

        if (res.ok) {
          const vCount = (data.record?.videos || []).length;
          const pCount = (data.record?.photos || []).length;
          showToast(`課程紀錄已新增（照片 ${pCount} 張，影片 ${vCount} 支）`);
          closeModal();
          loadRecords();
        } else {
          document.getElementById('uploadAlert').innerHTML = `<div class="alert alert-error">${data.error}</div>`;
        }
      } catch {
        document.getElementById('uploadAlert').innerHTML = '<div class="alert alert-error">上傳失敗，請稍後再試</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = '儲存紀錄';
        document.getElementById('uploadProgress').style.display = 'none';
        document.getElementById('progressBar').style.width = '0%';
      }
    });

    async function loadRecords() {
      try {
        const res = await fetch('/api/records?limit=50');
        const data = await res.json();
        const records = data.records || [];

        if (records.length === 0) {
          document.getElementById('recordsList').innerHTML =
            '<div class="empty"><div class="empty-icon">📸</div><p>尚未新增任何課程紀錄</p></div>';
          return;
        }

        document.getElementById('recordsList').innerHTML = records.map(r => {
          const photos = r.photos || [];
          const videos = r.videos || [];
          return `
          <div class="record-item">
            <div class="record-item-header">
              <div>
                <strong>${r.date}</strong>
                <span style="margin-left:8px;color:#6b7280">👤 ${r.student_name}</span>
                ${photos.length > 0 ? `<span style="margin-left:6px;font-size:12px;color:#9ca3af">📷${photos.length}</span>` : ''}
                ${videos.length > 0 ? `<span style="margin-left:4px;font-size:12px;color:#9ca3af">🎬${videos.length}</span>` : ''}
              </div>
              <button class="btn-sm btn-danger" onclick="deleteRecord('${r.id}')">刪除</button>
            </div>
            ${r.description ? `<div style="padding:0 16px 8px;font-size:13px;color:#4b5563">${r.description}</div>` : ''}
            ${photos.length > 0 ? `
              <div class="record-photos">
                ${photos.map(p => `<img src="${p.thumbnail_url||p.url}" alt="">`).join('')}
              </div>
            ` : ''}
            ${videos.length > 0 ? `
              <div class="record-videos">
                ${videos.map(v => `<video src="${v.url}" controls preload="none"></video>`).join('')}
              </div>
            ` : ''}
          </div>`;
        }).join('');
      } catch {
        document.getElementById('recordsList').innerHTML = '<div class="alert alert-error">載入失敗</div>';
      }
    }

    async function deleteRecord(id) {
      if (!confirm('確認刪除此課程紀錄？照片與影片也會一併刪除，此操作無法復原。')) return;
      try {
        const res = await fetch(`/api/records/${id}`, { method: 'DELETE' });
        if (res.ok) { showToast('已刪除'); loadRecords(); }
        else showToast('刪除失敗', 'error');
      } catch { showToast('操作失敗', 'error'); }
    }
  </script>
</body>
</html>
