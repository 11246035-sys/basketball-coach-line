<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程紀錄管理</title>
  <link rel="stylesheet" href="/assets/css/common.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <style>
    .upload-area {
      border: 2px dashed var(--gray-200);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover, .upload-area.dragover { border-color: var(--orange); }
    .upload-area input[type="file"] { display: none; }
    .preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .preview-item {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
    }
    .preview-item .remove {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .record-item {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .record-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
    }
    .record-photos {
      display: flex;
      gap: 4px;
      padding: 0 16px 12px;
      overflow-x: auto;
    }
    .record-photos img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <nav class="admin-nav">
    <div class="nav-brand">🏀 籃球家教後台</div>
    <button class="nav-logout" id="logoutBtn">登出</button>
  </nav>

  <div class="admin-tabs">
    <a href="dashboard.html" class="tab">📊 總覽</a>
    <a href="bookings.html" class="tab">📅 預約管理</a>
    <a href="calendar.html" class="tab">🗓️ 行事曆</a>
    <a href="records.html" class="tab active">📸 課程紀錄</a>
    <a href="students.html" class="tab">👥 學生管理</a>
    <a href="blacklist.html" class="tab">🚫 黑名單</a>
  </div>

  <div class="admin-container">
    <button class="btn btn-primary" onclick="openModal()" style="margin-bottom:16px;width:auto">
      + 新增課程紀錄
    </button>

    <div id="recordsList">載入中...</div>
  </div>

  <!-- 新增紀錄 Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-title">📸 新增課程紀錄</div>
      <form id="recordForm" enctype="multipart/form-data">
        <div class="form-group">
          <label>上課日期 *</label>
          <input type="date" id="recDate" required>
        </div>
        <div class="form-group">
          <label>學生姓名 *</label>
          <input type="text" id="recStudent" placeholder="請輸入學生姓名" required>
        </div>
        <div class="form-group">
          <label>LINE 用戶 ID（發送通知用，可留空）</label>
          <input type="text" id="recLineId" placeholder="Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
        </div>
        <div class="form-group">
          <label>課程說明</label>
          <textarea id="recDesc" placeholder="今日訓練內容、進步情況、下次重點..."></textarea>
        </div>
        <div class="form-group">
          <label>上傳照片（最多 5 張）</label>
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('photoInput').click()">
            <div style="font-size:32px">📷</div>
            <div style="font-size:14px;color:#6b7280;margin-top:8px">點擊選擇照片或拖曳至此</div>
            <input type="file" id="photoInput" accept="image/*" multiple>
          </div>
          <div class="preview-grid" id="previewGrid"></div>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="notifyParent" checked>
            <span>上傳後發送 LINE 通知給家長</span>
          </label>
        </div>

        <div id="uploadAlert"></div>
        <div id="uploadProgress" style="display:none">
          <div style="background:#e5e7eb;border-radius:4px;height:8px">
            <div id="progressBar" style="background:var(--orange);height:100%;border-radius:4px;width:0%;transition:width 0.3s"></div>
          </div>
          <div style="text-align:center;font-size:13px;margin-top:4px;color:#6b7280">上傳中...</div>
        </div>

        <div style="display:flex;gap:8px;margin-top:8px">
          <button type="button" class="btn btn-outline" onclick="closeModal()" style="flex:1">取消</button>
          <button type="submit" class="btn btn-primary" id="submitBtn" style="flex:1">儲存紀錄</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/js/admin-common.js"></script>
  <script>
    let selectedFiles = [];

    requireLogin(loadRecords);

    // 設定日期預設為今天
    document.getElementById('recDate').value = new Date().toISOString().split('T')[0];

    // 照片選擇
    document.getElementById('photoInput').addEventListener('change', handleFiles);

    // 拖放
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFiles({ target: { files: e.dataTransfer.files } });
    });

    function handleFiles(e) {
      const newFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
      selectedFiles = [...selectedFiles, ...newFiles].slice(0, 5);
      renderPreview();
    }

    function renderPreview() {
      const grid = document.getElementById('previewGrid');
      grid.innerHTML = selectedFiles.map((f, i) => {
        const url = URL.createObjectURL(f);
        return `<div class="preview-item">
          <img src="${url}" alt="">
          <button class="remove" onclick="removeFile(${i})">✕</button>
        </div>`;
      }).join('');
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      renderPreview();
    }

    function openModal() {
      document.getElementById('addModal').classList.add('active');
    }
    function closeModal() {
      document.getElementById('addModal').classList.remove('active');
      document.getElementById('recordForm').reset();
      selectedFiles = [];
      renderPreview();
      document.getElementById('uploadAlert').innerHTML = '';
      document.getElementById('recDate').value = new Date().toISOString().split('T')[0];
    }

    document.getElementById('recordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const date = document.getElementById('recDate').value;
      const student = document.getElementById('recStudent').value.trim();
      const lineId = document.getElementById('recLineId').value.trim();
      const desc = document.getElementById('recDesc').value.trim();
      const notify = document.getElementById('notifyParent').checked;

      if (!date || !student) {
        document.getElementById('uploadAlert').innerHTML = '<div class="alert alert-error">請填寫日期和學生姓名</div>';
        return;
      }

      const formData = new FormData();
      formData.append('date', date);
      formData.append('student_name', student);
      if (lineId) formData.append('line_user_id', lineId);
      if (desc) formData.append('description', desc);
      formData.append('notify', notify ? 'true' : 'false');
      selectedFiles.forEach(f => formData.append('photos', f));

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '儲存中...';
      document.getElementById('uploadProgress').style.display = 'block';
      document.getElementById('progressBar').style.width = '50%';

      try {
        const res = await fetch('/api/records', { method: 'POST', body: formData });
        document.getElementById('progressBar').style.width = '100%';
        const data = await res.json();

        if (res.ok) {
          showToast('課程紀錄已新增' + (notify && lineId ? '，通知已發送' : ''));
          closeModal();
          loadRecords();
        } else {
          document.getElementById('uploadAlert').innerHTML = `<div class="alert alert-error">${data.error}</div>`;
        }
      } catch {
        document.getElementById('uploadAlert').innerHTML = '<div class="alert alert-error">上傳失敗，請稍後再試</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = '儲存紀錄';
        document.getElementById('uploadProgress').style.display = 'none';
      }
    });

    async function loadRecords() {
      try {
        const res = await fetch('/api/records?limit=50');
        const data = await res.json();
        const records = data.records || [];

        if (records.length === 0) {
          document.getElementById('recordsList').innerHTML =
            '<div class="empty"><div class="empty-icon">📸</div><p>尚未新增任何課程紀錄</p></div>';
          return;
        }

        document.getElementById('recordsList').innerHTML = records.map(r => `
          <div class="record-item">
            <div class="record-item-header">
              <div>
                <strong>${r.date}</strong>
                <span style="margin-left:8px;color:#6b7280">👤 ${r.student_name}</span>
              </div>
              <button class="btn-sm btn-danger" onclick="deleteRecord('${r.id}')">刪除</button>
            </div>
            ${r.description ? `<div style="padding:0 16px 8px;font-size:13px;color:#4b5563">${r.description}</div>` : ''}
            ${(r.photos||[]).length > 0 ? `
              <div class="record-photos">
                ${r.photos.map(p => `<img src="${p.thumbnail_url||p.url}" alt="">`).join('')}
              </div>
            ` : ''}
          </div>
        `).join('');
      } catch {
        document.getElementById('recordsList').innerHTML = '<div class="alert alert-error">載入失敗</div>';
      }
    }

    async function deleteRecord(id) {
      if (!confirm('確認刪除此課程紀錄？照片也會一併刪除，此操作無法復原。')) return;
      try {
        const res = await fetch(`/api/records/${id}`, { method: 'DELETE' });
        if (res.ok) { showToast('已刪除'); loadRecords(); }
        else showToast('刪除失敗', 'error');
      } catch { showToast('操作失敗', 'error'); }
    }
  </script>
</body>
</html>
